<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>{{TITLE}}</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&display=swap"/>
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>

<style>
/* ========================================
   16:9 web-slide — single tab boilerplate
   ======================================== */

/* CSS variables — dark (default) */
:root {
  --bg:       #0b0f1a;
  --bg-2:     #131826;
  --bg-3:     #1c2335;
  --text:     #e6ecf5;
  --text-2:   #9aa8be;
  --text-3:   #6b7791;
  --line:     #2a3550;
  --line-2:   #3a4560;
  --accent:   #2dd4bf;
  --accent-2: #a78bfa;
}

/* Light theme override */
[data-theme="light"] {
  --bg:       #fafafa;
  --bg-2:     #ffffff;
  --bg-3:     #f0f4f8;
  --text:     #1e1e1e;
  --text-2:   #444a52;
  --text-3:   #777d85;
  --line:     #dde2eb;
  --line-2:   #c5ccd6;
  --accent:   #0d9488;
  --accent-2: #7c3aed;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Pretendard',
               'Noto Sans KR', system-ui, sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

@media print {
  header { display: none; }
  body { background: white; }
}

header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 24px;
  border-bottom: 1px solid var(--line);
}
header h1 {
  font-size: 14px; font-weight: 700; margin: 0;
  color: var(--text-2);
  letter-spacing: 1.4px; text-transform: uppercase;
}
.theme-toggle {
  background: transparent; border: 1px solid var(--line-2);
  border-radius: 6px; padding: 6px 12px;
  color: var(--text-2); cursor: pointer; font-size: 12px;
}
.theme-toggle:hover { color: var(--text); border-color: var(--accent); }

main {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}

.slide {
  width: 100%;
  max-width: 1320px;
  aspect-ratio: 16 / 9;
  min-height: 742px;
  display: block;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
}

/* Common SVG utility classes */
.flow-title-text {
  font-size: 22px; font-weight: 800; fill: var(--text);
  letter-spacing: -0.3px;
}
.flow-title-sub {
  font-size: 10.5px; font-weight: 700; fill: var(--text-3);
  letter-spacing: 1.4px; text-transform: uppercase;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
}
.flow-section-num {
  font: italic 800 56px Georgia, serif;
  fill: var(--text); opacity: 0.18;
}
.flow-section-label {
  font-size: 12px; font-weight: 700;
  letter-spacing: 1.3px; text-transform: uppercase;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
}
.flow-section-desc {
  font-size: 10.5px; fill: var(--text-3);
}
</style>
</head>
<body>

<header>
  <h1>{{TITLE}}</h1>
  <button class="theme-toggle" id="theme-toggle">
    <span id="theme-state">DARK</span> ◐
  </button>
</header>

<main>
  <svg class="slide" viewBox="0 0 1320 742"
       preserveAspectRatio="xMidYMin meet"
       xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="grid" x="0" y="0" width="32" height="32"
               patternUnits="userSpaceOnUse">
        <path d="M 32 0 L 0 0 0 32" fill="none"
              stroke="var(--line)" stroke-width="0.5" opacity="0.2"/>
      </pattern>
      <marker id="ah-default" viewBox="0 0 10 10"
              refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <polygon points="0 0, 10 5, 0 10" fill="#64748b"/>
      </marker>
    </defs>
    <rect width="100%" height="100%" fill="url(#grid)" pointer-events="none"/>
    <g id="content"></g>
  </svg>
</main>

<script>
'use strict';

// ─── SVG helper ────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';

function svg(tag, attrs = {}, ...children) {
  const e = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'text') e.textContent = v;
    else if (v != null) e.setAttribute(k, v);
  }
  for (const c of children) {
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  }
  return e;
}

function clear(node) {
  while (node.firstChild) node.removeChild(node.firstChild);
}

function wrapSvgText(text, maxChars = 36) {
  if (!text || text.length <= maxChars) return [text || ''];
  const lines = [];
  let remaining = text;
  while (remaining.length > maxChars) {
    let cut = remaining.lastIndexOf(' ', maxChars);
    if (cut < maxChars * 0.5) cut = maxChars;
    lines.push(remaining.slice(0, cut));
    remaining = remaining.slice(cut).trim();
  }
  if (remaining) lines.push(remaining);
  return lines;
}

// ─── State ────────────────────────────────────────────
const state = {
  theme: 'dark',
};

// ─── Data ─────────────────────────────────────────────
const SLIDE = {
  title: '{{TITLE}}',
  subtitle: '{{SUBTITLE}}',
  // 사용자 콘텐츠를 여기에
};

// ─── Render ───────────────────────────────────────────
const $content = document.getElementById('content');

function render() {
  clear($content);

  // Sub-title
  $content.appendChild(svg('text', {
    class: 'flow-title-sub', x: 30, y: 32,
    text: SLIDE.subtitle,
  }));

  // Title
  $content.appendChild(svg('text', {
    class: 'flow-title-text', x: 30, y: 70,
    text: SLIDE.title,
  }));

  // Section 01 placeholder
  $content.appendChild(svg('text', {
    class: 'flow-section-num', x: 30, y: 180,
    text: '01',
  }));
  $content.appendChild(svg('text', {
    class: 'flow-section-label', x: 100, y: 156,
    fill: 'var(--accent)',
    text: 'SECTION ONE',
  }));
  $content.appendChild(svg('text', {
    class: 'flow-section-desc', x: 100, y: 174,
    text: '이곳에 콘텐츠를 추가하세요',
  }));

  // 예시: 큰 카드
  $content.appendChild(svg('rect', {
    x: 30, y: 220, width: 1260, height: 480, rx: 12,
    fill: 'var(--bg-3)', stroke: 'var(--line-2)', 'stroke-width': 1.2,
    filter: 'drop-shadow(0 2px 8px rgba(0,0,0,0.4))',
  }));
  $content.appendChild(svg('text', {
    x: 660, y: 460,
    fill: 'var(--text-3)', 'font-size': 18,
    'text-anchor': 'middle',
    text: '콘텐츠 영역 (1260 × 480)',
  }));
}

// ─── Theme ────────────────────────────────────────────
function applyTheme(theme) {
  state.theme = theme;
  document.body.setAttribute('data-theme', theme);
  document.getElementById('theme-state').textContent = theme.toUpperCase();
  try { localStorage.setItem('webslide-theme', theme); } catch (e) {}
  // SVG 안의 hardcoded color 가 있으면 재렌더 필요
  render();
}

function toggleTheme() {
  applyTheme(state.theme === 'dark' ? 'light' : 'dark');
}

// ─── Bootstrap ────────────────────────────────────────
function bootstrap() {
  document.getElementById('theme-toggle')
    ?.addEventListener('click', toggleTheme);

  let saved = 'dark';
  try { saved = localStorage.getItem('webslide-theme') || 'dark'; }
  catch (e) {}
  applyTheme(saved);
}

document.addEventListener('DOMContentLoaded', bootstrap);
</script>
</body>
</html>
