<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>{{TITLE}}</title>

<!-- Web fonts (선택, 한영 혼용 권장) -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&display=swap"/>
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>

<style>
/* ========================================
   16:9 web-slide — multi-tab shell
   기본: 3 탭. 새 탭 추가 시 6 위치 모두 패치.
   ======================================== */

/* CSS variables — dark (default, Tech Innovation theme) */
:root {
  --bg:       #0b0f1a;
  --bg-2:     #131826;
  --bg-3:     #1c2335;
  --text:     #e6ecf5;
  --text-2:   #9aa8be;
  --text-3:   #6b7791;
  --line:     #2a3550;
  --line-2:   #3a4560;
  --accent:   #2dd4bf;
  --accent-2: #a78bfa;
  --layer-1:  #a78bfa;
  --layer-2:  #2dd4bf;
  --layer-3:  #fb923c;
  --layer-4:  #f87171;
}

[data-theme="light"] {
  --bg:       #fafafa;
  --bg-2:     #ffffff;
  --bg-3:     #f0f4f8;
  --text:     #1e1e1e;
  --text-2:   #444a52;
  --text-3:   #777d85;
  --line:     #dde2eb;
  --line-2:   #c5ccd6;
  --accent:   #0d9488;
  --accent-2: #7c3aed;
  --layer-1:  #7c3aed;
  --layer-2:  #0d9488;
  --layer-3:  #ea580c;
  --layer-4:  #dc2626;
}

* { box-sizing: border-box; }
body {
  margin: 0; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Pretendard',
               'Noto Sans KR', system-ui, sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
  /* 인쇄 / PDF export 시 배경 색 유지 */
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

@media print {
  header, .tabs { display: none; }
  .view { page-break-after: always; }
  .view.active { display: block !important; }
  .view:not(.active) { display: block !important; }  /* 모든 슬라이드 인쇄 */
  body { background: white; }
}

header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 24px; border-bottom: 1px solid var(--line);
}
header h1 {
  font-size: 14px; font-weight: 700; margin: 0;
  color: var(--text-2);
  letter-spacing: 1.4px; text-transform: uppercase;
}
.theme-toggle {
  background: transparent; border: 1px solid var(--line-2);
  border-radius: 6px; padding: 6px 10px;
  color: var(--text-2); cursor: pointer; font-size: 12px;
  display: inline-flex; align-items: center; gap: 6px;
}
.theme-toggle:hover { color: var(--text); border-color: var(--accent); }
.theme-toggle svg { width: 14px; height: 14px; stroke: currentColor; fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.tabs {
  display: flex; gap: 4px;
  padding: 12px 24px 0;
  border-bottom: 1px solid var(--line);
  flex-wrap: wrap;
}
.tab {
  background: transparent;
  border: 1px solid var(--line-2);
  border-bottom: none;
  border-radius: 8px 8px 0 0;
  padding: 8px 16px;
  color: var(--text-3);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  transition: color 0.15s, background 0.15s;
}
.tab:hover { color: var(--text-2); }
.tab.active {
  color: var(--accent);
  background: var(--bg-3);
  border-color: var(--accent);
  border-bottom: 1px solid var(--bg-3);
  margin-bottom: -1px;
}

main { flex: 1; padding: 24px; }

.view { display: none; }
.view.active { display: block; }

.slide {
  width: 100%; max-width: 1320px; margin: 0 auto;
  aspect-ratio: 16 / 9; min-height: 742px;
  display: block;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
}

/* Common SVG utility classes */
.flow-title-text { font-size: 22px; font-weight: 800; fill: var(--text); }
.flow-title-sub {
  font-size: 10.5px; font-weight: 700; fill: var(--text-3);
  letter-spacing: 1.4px; text-transform: uppercase;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
}
.flow-section-num {
  font: italic 800 56px Georgia, serif;
  fill: var(--text); opacity: 0.18;
}
.flow-section-label {
  font-size: 12px; font-weight: 700;
  letter-spacing: 1.3px; text-transform: uppercase;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
}
.flow-section-desc { font-size: 10.5px; fill: var(--text-3); }
</style>
</head>
<body>

<header>
  <h1>{{TITLE}}</h1>
  <button class="theme-toggle" id="theme-toggle" title="Toggle theme (T)">
    <svg id="theme-icon" viewBox="0 0 24 24"></svg>
    <span id="theme-state">DARK</span>
  </button>
</header>

<!--
  탭 버튼 — 새 탭 추가 시 다음 4 위치도 같이 편집:
  (1) 아래 .view.view-XX 컨테이너 추가
  (2) switchView() 의 else if 분기
  (3) applyTheme() 의 else if 분기
  (4) TAB_XX 데이터 객체 + renderXX 함수
-->
<div class="tabs">
  <button class="tab active" data-view="overview">Overview</button>
  <button class="tab"        data-view="system">System</button>
  <button class="tab"        data-view="metrics">Metrics</button>
</div>

<main>
  <!-- view-overview -->
  <div class="view view-overview active">
    <svg class="slide" viewBox="0 0 1320 742"
         preserveAspectRatio="xMidYMin meet"
         xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="grid-overview" x="0" y="0" width="32" height="32"
                 patternUnits="userSpaceOnUse">
          <path d="M 32 0 L 0 0 0 32" fill="none"
                stroke="var(--line)" stroke-width="0.5" opacity="0.2"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid-overview)"
            pointer-events="none"/>
      <g id="overview-content"></g>
    </svg>
  </div>

  <!-- view-system -->
  <div class="view view-system">
    <svg class="slide" viewBox="0 0 1320 742"
         preserveAspectRatio="xMidYMin meet"
         xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="grid-system" x="0" y="0" width="32" height="32"
                 patternUnits="userSpaceOnUse">
          <path d="M 32 0 L 0 0 0 32" fill="none"
                stroke="var(--line)" stroke-width="0.5" opacity="0.2"/>
        </pattern>
        <marker id="ah-system" viewBox="0 0 10 10"
                refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
          <polygon points="0 0, 10 5, 0 10" fill="#64748b"/>
        </marker>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid-system)"
            pointer-events="none"/>
      <g id="system-content"></g>
    </svg>
  </div>

  <!-- view-metrics -->
  <div class="view view-metrics">
    <svg class="slide" viewBox="0 0 1320 742"
         preserveAspectRatio="xMidYMin meet"
         xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="grid-metrics" x="0" y="0" width="32" height="32"
                 patternUnits="userSpaceOnUse">
          <path d="M 32 0 L 0 0 0 32" fill="none"
                stroke="var(--line)" stroke-width="0.5" opacity="0.2"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid-metrics)"
            pointer-events="none"/>
      <g id="metrics-content"></g>
    </svg>
  </div>
</main>

<script>
'use strict';

// ─── SVG helper ────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';

function svg(tag, attrs = {}, ...children) {
  const e = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'text') e.textContent = v;
    else if (v != null) e.setAttribute(k, v);
  }
  for (const c of children) {
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  }
  return e;
}

function clear(node) {
  while (node.firstChild) node.removeChild(node.firstChild);
}

function wrapSvgText(text, maxChars = 36) {
  if (!text || text.length <= maxChars) return [text || ''];
  const lines = [];
  let remaining = text;
  while (remaining.length > maxChars) {
    let cut = remaining.lastIndexOf(' ', maxChars);
    if (cut < maxChars * 0.5) cut = maxChars;
    lines.push(remaining.slice(0, cut));
    remaining = remaining.slice(cut).trim();
  }
  if (remaining) lines.push(remaining);
  return lines;
}

// ─── State ────────────────────────────────────────────
const state = {
  view: 'overview',
  theme: 'dark',
};

// ─── Data 객체 (탭별) ─────────────────────────────────
const TAB_OVERVIEW = {
  title: '{{TITLE}}',
  subtitle: 'OVERVIEW',
  bullets: [
    '핵심 메시지 1',
    '핵심 메시지 2',
    '핵심 메시지 3',
  ],
};

const TAB_SYSTEM = {
  title: '시스템 구조',
  subtitle: 'SYSTEM ARCHITECTURE',
  // 노드 / 엣지 데이터를 여기에
};

const TAB_METRICS = {
  title: '성능 지표',
  subtitle: 'METRICS',
  // 지표 데이터를 여기에
};

// ─── Render 함수 (탭별) ───────────────────────────────
const $overviewContent = document.getElementById('overview-content');
const $systemContent   = document.getElementById('system-content');
const $metricsContent  = document.getElementById('metrics-content');

function renderOverview() {
  clear($overviewContent);
  const T = TAB_OVERVIEW;
  $overviewContent.appendChild(svg('text', {
    class: 'flow-title-sub', x: 30, y: 32, text: T.subtitle,
  }));
  $overviewContent.appendChild(svg('text', {
    class: 'flow-title-text', x: 30, y: 70, text: T.title,
  }));
  T.bullets.forEach((b, i) => {
    $overviewContent.appendChild(svg('text', {
      x: 30, y: 140 + i * 30,
      fill: 'var(--text)', 'font-size': 18,
      text: '· ' + b,
    }));
  });
}

function renderSystem() {
  clear($systemContent);
  const T = TAB_SYSTEM;
  $systemContent.appendChild(svg('text', {
    class: 'flow-title-sub', x: 30, y: 32, text: T.subtitle,
  }));
  $systemContent.appendChild(svg('text', {
    class: 'flow-title-text', x: 30, y: 70, text: T.title,
  }));
  $systemContent.appendChild(svg('text', {
    x: 660, y: 380, 'text-anchor': 'middle',
    fill: 'var(--text-3)', 'font-size': 18,
    text: '시스템 다이어그램을 여기에',
  }));
}

function renderMetrics() {
  clear($metricsContent);
  const T = TAB_METRICS;
  $metricsContent.appendChild(svg('text', {
    class: 'flow-title-sub', x: 30, y: 32, text: T.subtitle,
  }));
  $metricsContent.appendChild(svg('text', {
    class: 'flow-title-text', x: 30, y: 70, text: T.title,
  }));
  $metricsContent.appendChild(svg('text', {
    x: 660, y: 380, 'text-anchor': 'middle',
    fill: 'var(--text-3)', 'font-size': 18,
    text: '지표 카드를 여기에',
  }));
}

// ─── View 전환 ────────────────────────────────────────
function switchView(view) {
  state.view = view;
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.view === view));
  document.querySelectorAll('.view').forEach(v =>
    v.classList.toggle('active', v.classList.contains(`view-${view}`)));

  // ★ 새 탭 추가 시 여기에 분기 추가
  if (view === 'overview')      renderOverview();
  else if (view === 'system')   renderSystem();
  else if (view === 'metrics')  renderMetrics();
}

// ─── 테마 토글 ────────────────────────────────────────
const THEME_ICONS = {
  // moon (현재 dark, 클릭 시 light)
  dark: 'M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z',
  // sun (현재 light, 클릭 시 dark)
  light: 'M12 1v2 M12 21v2 M4.22 4.22l1.42 1.42 M18.36 18.36l1.42 1.42 M1 12h2 M21 12h2 M4.22 19.78l1.42-1.42 M18.36 5.64l1.42-1.42 M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z',
};

function applyTheme(theme) {
  state.theme = theme;
  document.body.setAttribute('data-theme', theme);
  document.getElementById('theme-state').textContent = theme.toUpperCase();
  const icon = document.getElementById('theme-icon');
  if (icon && THEME_ICONS[theme]) {
    while (icon.firstChild) icon.removeChild(icon.firstChild);
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', THEME_ICONS[theme]);
    icon.appendChild(path);
  }
  try { localStorage.setItem('webslide-theme', theme); } catch (e) {}

  // ★ 새 탭 추가 시 여기에도 분기 추가 (그래야 토글 후 재진입 시 정상 렌더)
  if (state.view === 'overview')      renderOverview();
  else if (state.view === 'system')   renderSystem();
  else if (state.view === 'metrics')  renderMetrics();
}

function toggleTheme() {
  applyTheme(state.theme === 'dark' ? 'light' : 'dark');
}

// ─── Bootstrap ────────────────────────────────────────
function bootstrap() {
  document.querySelectorAll('.tab').forEach(t =>
    t.addEventListener('click', () => switchView(t.dataset.view)));
  document.getElementById('theme-toggle')
    ?.addEventListener('click', toggleTheme);

  // 키보드 단축키: ← → 탭 이동, T 테마 토글
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const tabs = [...document.querySelectorAll('.tab')].map(t => t.dataset.view);
    const idx = tabs.indexOf(state.view);
    if (e.key === 'ArrowRight' && idx < tabs.length - 1) {
      switchView(tabs[idx + 1]);
    } else if (e.key === 'ArrowLeft' && idx > 0) {
      switchView(tabs[idx - 1]);
    } else if (e.key === 't' || e.key === 'T') {
      toggleTheme();
    }
  });

  let saved = 'dark';
  try { saved = localStorage.getItem('webslide-theme') || 'dark'; }
  catch (e) {}
  applyTheme(saved);
  switchView(state.view);
}

document.addEventListener('DOMContentLoaded', bootstrap);
</script>
</body>
</html>
